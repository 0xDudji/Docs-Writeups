<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">MITRE mapping for Vantage</title>
  <desc id="desc">Wireshark-style ATT and CK mapping board linking each tactic and technique to concrete packet evidence.</desc>
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #e6edf3; }
      .sub { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #9fb3c8; }
      .h { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #e6edf3; }
      .tech { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #7cc7ff; }
      .evi { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #d8e2ec; }
      .noteT { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #12263a; }
      .noteS { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #17334b; }
    </style>
  </defs>

  <rect width="1400" height="760" fill="#0d1117" rx="16"/>
  <text x="36" y="48" class="title">MITRE ATT and CK Mapping</text>
  <text x="36" y="78" class="sub">Every mapping is tied to packet-level behavior from the two captures.</text>

  <rect x="34" y="100" width="1332" height="620" rx="10" fill="#1f242d" stroke="#3a4451"/>
  <rect x="34" y="100" width="1332" height="30" fill="#2b313c"/>
  <text x="48" y="120" style="font:500 14px 'Segoe UI'; fill:#d8e2ec;">Technique mapping board</text>

  <rect x="60" y="150" width="1280" height="86" rx="8" fill="#243041"/>
  <text x="78" y="178" class="h">Reconnaissance</text>
  <text x="320" y="178" class="tech">T1595.003 Active Scanning</text>
  <text x="320" y="202" class="evi">Evidence: ffuf-like request burst across 3,579 subdomains from 117.200.21.26.</text>

  <rect x="60" y="246" width="1280" height="86" rx="8" fill="#273647"/>
  <text x="78" y="274" class="h">Initial Access</text>
  <text x="320" y="274" class="tech">T1078.004 Valid Accounts (Cloud)</text>
  <text x="320" y="298" class="evi">Evidence: successful Horizon login with valid admin credentials (HTTP 302 redirect).</text>

  <rect x="60" y="342" width="1280" height="86" rx="8" fill="#2a394b"/>
  <text x="78" y="370" class="h">Discovery</text>
  <text x="320" y="370" class="tech">T1580 Cloud Infrastructure Discovery</text>
  <text x="320" y="394" class="evi">Evidence: direct Keystone and related API enumeration after OpenRC pivot.</text>

  <rect x="60" y="438" width="1280" height="86" rx="8" fill="#2d3c4f"/>
  <text x="78" y="466" class="h">Collection</text>
  <text x="320" y="466" class="tech">T1530 Data from Cloud Storage</text>
  <text x="320" y="490" class="evi">Evidence: Swift object requests and CSV downloads containing user and employee data.</text>

  <rect x="60" y="534" width="1280" height="86" rx="8" fill="#354252" stroke="#f778ba" stroke-width="1.5"/>
  <text x="78" y="562" class="h">Persistence</text>
  <text x="320" y="562" class="tech">T1136.003 Create Account (Cloud)</text>
  <text x="320" y="586" class="evi">Evidence: POST creating user jellibean followed by admin role assignment request.</text>

  <rect x="60" y="636" width="1280" height="70" rx="8" fill="#d3f4ff"/>
  <text x="78" y="662" class="noteT">Analyst guidance</text>
  <text x="78" y="686" class="noteS">Use this table as justification text. Name the behavior first, then cite the packet evidence that supports each ATT and CK technique.</text>
</svg>