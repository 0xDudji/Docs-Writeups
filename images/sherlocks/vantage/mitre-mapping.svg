<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">MITRE mapping for Vantage</title>
  <desc id="desc">Visual map of observed behaviors to MITRE ATT and CK techniques.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11151e"/>
      <stop offset="100%" stop-color="#171f2d"/>
    </linearGradient>
    <style>
      .head { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #f3f8ff; }
      .sub { font: 400 19px 'Segoe UI', Arial, sans-serif; fill: #aec2d6; }
      .phase { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #f7fbff; }
      .tech { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #9ad7ff; }
      .evi { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #d3e4f5; }
    </style>
  </defs>

  <rect width="1400" height="760" rx="24" fill="url(#bg3)"/>
  <text x="70" y="85" class="head">MITRE ATT and CK Mapping - Vantage</text>
  <text x="70" y="120" class="sub">Technique alignment based on packet-level evidence</text>

  <rect x="70" y="170" width="1260" height="90" rx="12" fill="#24313f"/>
  <text x="100" y="206" class="phase">Reconnaissance</text>
  <text x="360" y="206" class="tech">T1595.003 Active Scanning</text>
  <text x="360" y="236" class="evi">ffuf-driven subdomain wordlist scanning from 117.200.21.26</text>

  <rect x="70" y="280" width="1260" height="90" rx="12" fill="#22374a"/>
  <text x="100" y="316" class="phase">Initial Access</text>
  <text x="360" y="316" class="tech">T1078.004 Valid Accounts (Cloud)</text>
  <text x="360" y="346" class="evi">Successful admin authentication on Horizon dashboard</text>

  <rect x="70" y="390" width="1260" height="90" rx="12" fill="#213f46"/>
  <text x="100" y="426" class="phase">Discovery</text>
  <text x="360" y="426" class="tech">T1580 Cloud Infrastructure Discovery</text>
  <text x="360" y="456" class="evi">Enumeration of Keystone users, services, endpoints, and Swift containers</text>

  <rect x="70" y="500" width="1260" height="90" rx="12" fill="#3d3647"/>
  <text x="100" y="536" class="phase">Collection</text>
  <text x="360" y="536" class="tech">T1530 Data from Cloud Storage</text>
  <text x="360" y="566" class="evi">Download of user-details.csv and employee-details.csv from Swift</text>

  <rect x="70" y="610" width="1260" height="90" rx="12" fill="#4a2f37" stroke="#bd556e" stroke-width="2"/>
  <text x="100" y="646" class="phase">Persistence</text>
  <text x="360" y="646" class="tech">T1136.003 Create Account (Cloud)</text>
  <text x="360" y="676" class="evi">POST /identity/v3/users creates jellibean; role assignment grants admin access</text>
</svg>