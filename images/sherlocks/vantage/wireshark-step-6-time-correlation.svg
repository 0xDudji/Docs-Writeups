<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Wireshark Step 6 Timestamp Correlation</title>
  <desc id="desc">Shows how to correlate events between two PCAP files by timestamp.</desc>
  <defs>
    <style>
      .h { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #edf5ff; }
      .s { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #bfd2e6; }
      .t { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #d6e7f7; }
      .tag { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #102536; }
    </style>
  </defs>
  <rect width="1400" height="780" fill="#0f1724" rx="20"/>
  <text x="56" y="72" class="h">Wireshark Step 6: Timestamp Correlation Across PCAPs</text>
  <text x="56" y="108" class="s">Goal: prove pivot from web dashboard activity to direct API activity</text>

  <rect x="70" y="170" width="610" height="520" rx="12" fill="#1a2b3e" stroke="#3b5f84"/>
  <text x="95" y="205" class="t">web-server_2025-07-01.pcap</text>
  <line x1="120" y1="260" x2="620" y2="260" stroke="#406080" stroke-width="4"/>
  <circle cx="220" cy="260" r="10" fill="#ffd166"/>
  <text x="170" y="240" class="t">09:40:07</text>
  <text x="160" y="300" class="t">Successful dashboard login</text>
  <circle cx="430" cy="260" r="10" fill="#ff9f1c"/>
  <text x="382" y="240" class="t">09:40:29</text>
  <text x="360" y="300" class="t">OpenRC download</text>

  <rect x="720" y="170" width="610" height="520" rx="12" fill="#1a2f35" stroke="#3f7480"/>
  <text x="745" y="205" class="t">controller_2025-07-01.pcap</text>
  <line x1="770" y1="260" x2="1270" y2="260" stroke="#406080" stroke-width="4"/>
  <circle cx="980" cy="260" r="10" fill="#7ee787"/>
  <text x="932" y="240" class="t">09:41:44</text>
  <text x="885" y="300" class="t">First direct API request</text>

  <line x1="430" y1="350" x2="980" y2="350" stroke="#8be9fd" stroke-width="4" stroke-dasharray="8 8"/>
  <rect x="560" y="320" width="290" height="56" rx="10" fill="#8be9fd"/>
  <text x="612" y="355" class="tag">Approx. 75 second gap</text>

  <text x="96" y="620" class="t">Method: keep both captures in UTC, compare exact event timestamps, and map causality.</text>
</svg>