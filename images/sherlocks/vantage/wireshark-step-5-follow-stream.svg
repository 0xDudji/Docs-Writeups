<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Wireshark Step 5 Follow TCP Stream</title>
  <desc id="desc">Wireshark-like right-click workflow and stream reconstruction showing login POST and HTTP response evidence.</desc>
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #e6edf3; }
      .sub { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #9fb3c8; }
      .ui { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #d8e2ec; }
      .mono { font: 600 14px 'Consolas', 'Courier New', monospace; fill: #d8e2ec; }
      .call { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #12263a; }
      .callSmall { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #17334b; }
    </style>
  </defs>

  <rect width="1400" height="780" fill="#0d1117" rx="16"/>
  <text x="36" y="48" class="title">Step 5 - Follow TCP Stream</text>
  <text x="36" y="78" class="sub">Rebuild full request and response to extract credentials and success codes.</text>

  <rect x="34" y="100" width="690" height="640" rx="10" fill="#1f242d" stroke="#3a4451"/>
  <rect x="34" y="100" width="690" height="30" fill="#2b313c"/>
  <text x="48" y="120" class="ui">web-server_2025-07-01.pcap - Wireshark</text>

  <rect x="50" y="146" width="658" height="300" rx="6" fill="#181d25" stroke="#4b5563"/>
  <rect x="58" y="154" width="642" height="24" fill="#243041"/>
  <text x="66" y="171" class="mono">No.   Time       Source         Destination      Protocol  Info</text>
  <rect x="58" y="184" width="642" height="28" fill="#31557f"/>
  <text x="66" y="203" class="mono">18240 09:40:07   117.200.21.26  157.230.81.229   HTTP      POST /dashboard/auth/login/</text>

  <rect x="420" y="218" width="280" height="190" rx="6" fill="#f2f5f8" stroke="#9aa6b5"/>
  <text x="436" y="240" style="font:600 13px 'Segoe UI'; fill:#1a2a3a;">Right click packet</text>
  <text x="436" y="264" style="font:500 13px 'Segoe UI'; fill:#1a2a3a;">Apply as Filter</text>
  <text x="436" y="286" style="font:500 13px 'Segoe UI'; fill:#1a2a3a;">Copy</text>
  <text x="436" y="308" style="font:500 13px 'Segoe UI'; fill:#1a2a3a;">Decode As</text>
  <text x="436" y="330" style="font:500 13px 'Segoe UI'; fill:#1a2a3a;">Follow</text>
  <rect x="430" y="338" width="260" height="24" fill="#b7dcff"/>
  <text x="438" y="355" style="font:600 13px 'Segoe UI'; fill:#12324e;">TCP Stream</text>

  <line x1="382" y1="198" x2="420" y2="228" stroke="#58d0ff" stroke-width="3"/>

  <rect x="50" y="462" width="658" height="260" rx="6" fill="#181d25" stroke="#4b5563"/>
  <rect x="58" y="470" width="642" height="24" fill="#243041"/>
  <text x="66" y="487" class="mono">Follow TCP Stream: stream 37</text>
  <text x="66" y="514" class="mono">POST /dashboard/auth/login/ HTTP/1.1</text>
  <text x="66" y="536" class="mono">Host: cloud.vantage.tech</text>
  <text x="66" y="558" class="mono">username=admin&amp;password=StrongAdminSecret&amp;region=default</text>
  <text x="66" y="590" class="mono">HTTP/1.1 302 Found</text>
  <text x="66" y="612" class="mono">Location: /dashboard/project/</text>

  <rect x="740" y="100" width="626" height="640" rx="10" fill="#1f242d" stroke="#3a4451"/>
  <text x="760" y="136" class="ui">Evidence to extract from this window</text>

  <rect x="760" y="160" width="586" height="180" rx="8" fill="#d3f4ff"/>
  <text x="776" y="186" class="call">Login outcome</text>
  <text x="776" y="210" class="callSmall">HTTP 200 usually means failed login page reload.</text>
  <text x="776" y="232" class="callSmall">HTTP 302 redirect means login success.</text>
  <text x="776" y="254" class="callSmall">Count failed attempts before first 302.</text>

  <rect x="760" y="360" width="586" height="180" rx="8" fill="#d5ffe4"/>
  <text x="776" y="386" class="call">OpenRC download stream</text>
  <text x="776" y="410" class="callSmall">Follow request with URI containing openrc.</text>
  <text x="776" y="432" class="callSmall">Read Content-Disposition for filename.</text>
  <text x="776" y="454" class="callSmall">Extract OS_AUTH_URL and project information.</text>

  <rect x="760" y="560" width="586" height="160" rx="8" fill="#ffe8c5"/>
  <text x="776" y="586" class="call">Why this matters</text>
  <text x="776" y="610" class="callSmall">This is where raw request data becomes clear evidence:</text>
  <text x="776" y="632" class="callSmall">credentials, response codes, downloaded files, and timing.</text>
</svg>