<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Wireshark Step 5 Follow TCP Stream</title>
  <desc id="desc">Guide for opening Follow TCP Stream and reading request and response content.</desc>
  <defs>
    <style>
      .h { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #edf5ff; }
      .s { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #bfd2e6; }
      .t { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #d6e7f7; }
      .code { font: 600 16px 'Consolas', monospace; fill: #a8f0c6; }
    </style>
  </defs>
  <rect width="1400" height="780" fill="#0e1623" rx="20"/>
  <text x="56" y="72" class="h">Wireshark Step 5: Follow TCP Stream</text>
  <text x="56" y="108" class="s">Goal: reconstruct full HTTP exchange and extract evidence</text>

  <rect x="56" y="150" width="640" height="550" rx="12" fill="#1a2638" stroke="#36506d"/>
  <text x="82" y="186" class="t">Packet list</text>
  <rect x="82" y="210" width="588" height="40" fill="#23405b" rx="6"/>
  <text x="96" y="236" class="t">POST /dashboard/auth/login HTTP/1.1</text>
  <rect x="82" y="264" width="350" height="42" fill="#7ee787" rx="8"/>
  <text x="98" y="291" style="font:700 16px 'Segoe UI'; fill:#0f2336;">Right click selected packet</text>
  <rect x="82" y="324" width="390" height="240" fill="#f8fbff" rx="8"/>
  <text x="104" y="354" style="font:600 16px 'Segoe UI'; fill:#1c2f45;">Follow</text>
  <text x="104" y="390" style="font:500 15px 'Segoe UI'; fill:#1c2f45;">UDP Stream</text>
  <rect x="96" y="404" width="360" height="34" fill="#9fd3ff" rx="6"/>
  <text x="112" y="426" style="font:700 15px 'Segoe UI'; fill:#0f2336;">TCP Stream</text>

  <rect x="726" y="150" width="618" height="550" rx="12" fill="#102235" stroke="#3a6287"/>
  <text x="748" y="186" class="t">Follow TCP Stream output</text>
  <text x="748" y="226" class="code">POST /dashboard/auth/login HTTP/1.1</text>
  <text x="748" y="254" class="code">username=admin and password=StrongAdminSecret</text>
  <text x="748" y="308" class="code">HTTP/1.1 302 Found</text>
  <text x="748" y="336" class="code">Location: /dashboard/project/</text>
  <text x="748" y="390" class="t">Use this view for:</text>
  <text x="748" y="424" class="t">- Login validation by response code</text>
  <text x="748" y="452" class="t">- OpenRC download headers</text>
  <text x="748" y="480" class="t">- JSON bodies for user creation</text>
</svg>