<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Wireshark Step 4 User-Agent Analysis</title>
  <desc id="desc">Wireshark-like packet list and packet details pane showing where User-Agent is read and how to interpret it.</desc>
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #e6edf3; }
      .sub { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #9fb3c8; }
      .ui { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #d8e2ec; }
      .mono { font: 600 14px 'Consolas', 'Courier New', monospace; fill: #d8e2ec; }
      .call { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #12263a; }
      .callSmall { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #17334b; }
    </style>
  </defs>

  <rect width="1400" height="780" fill="#0d1117" rx="16"/>
  <text x="36" y="48" class="title">Step 4 - Check User-Agent</text>
  <text x="36" y="78" class="sub">Use packet details to separate tool traffic from human browser traffic.</text>

  <rect x="34" y="100" width="990" height="640" rx="10" fill="#1f242d" stroke="#3a4451"/>
  <rect x="34" y="100" width="990" height="30" fill="#2b313c"/>
  <text x="48" y="120" class="ui">web-server_2025-07-01.pcap - Wireshark</text>

  <rect x="50" y="146" width="958" height="180" rx="6" fill="#181d25" stroke="#4b5563"/>
  <rect x="58" y="154" width="942" height="24" fill="#243041"/>
  <text x="66" y="171" class="mono">No.    Source         Host                Method  URI                      User-Agent</text>

  <rect x="58" y="182" width="942" height="28" fill="#5c2222"/>
  <text x="66" y="201" class="mono">1061   117.200.21.26  abc.vantage.tech    GET     /                        Fuzz Faster U Fool...</text>
  <rect x="58" y="212" width="942" height="28" fill="#243e60"/>
  <text x="66" y="231" class="mono">18201  117.200.21.26  cloud.vantage.tech  GET     /dashboard/               Mozilla/5.0 Chrome...</text>
  <text x="66" y="262" class="mono">Selected packet: No. 1061</text>

  <rect x="50" y="340" width="958" height="382" rx="6" fill="#181d25" stroke="#4b5563"/>
  <rect x="58" y="348" width="942" height="24" fill="#243041"/>
  <text x="66" y="365" class="mono">Packet Details</text>

  <text x="74" y="394" class="mono">Frame 1061: 584 bytes on wire</text>
  <text x="74" y="420" class="mono">Ethernet II</text>
  <text x="74" y="446" class="mono">Internet Protocol Version 4</text>
  <text x="74" y="472" class="mono">Transmission Control Protocol</text>
  <rect x="68" y="480" width="660" height="28" fill="#30465f"/>
  <text x="74" y="499" class="mono">Hypertext Transfer Protocol</text>

  <rect x="86" y="516" width="900" height="28" fill="#1f2937"/>
  <text x="94" y="535" class="mono">Host: abc.vantage.tech</text>
  <rect x="86" y="546" width="900" height="30" fill="#5b3d22"/>
  <text x="94" y="566" class="mono">User-Agent: Fuzz Faster U Fool v2.1.0-dev</text>

  <rect x="86" y="580" width="900" height="30" fill="#224768"/>
  <text x="94" y="600" class="mono">User-Agent: Mozilla/5.0 (Windows NT 10.0...) Chrome/137.0.0.0</text>

  <rect x="1040" y="150" width="330" height="250" rx="8" fill="#d3f4ff"/>
  <text x="1056" y="176" class="call">How to read this</text>
  <text x="1056" y="200" class="callSmall">1) Click packet from fuzzing period.</text>
  <text x="1056" y="222" class="callSmall">2) Expand Hypertext Transfer Protocol.</text>
  <text x="1056" y="244" class="callSmall">3) Read User-Agent field value.</text>
  <text x="1056" y="266" class="callSmall">ffuf value = automated discovery.</text>
  <text x="1056" y="288" class="callSmall">Chrome value = manual operator phase.</text>
  <text x="1056" y="310" class="callSmall">The switch marks the pivot moment.</text>

  <line x1="1008" y1="560" x2="1040" y2="302" stroke="#58d0ff" stroke-width="3"/>
</svg>