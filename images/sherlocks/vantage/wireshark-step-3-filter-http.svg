<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Wireshark Step 3 HTTP Request Filtering</title>
  <desc id="desc">Wireshark-style packet list filtered by attacker source IP, showing fuzzing then manual dashboard activity.</desc>
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #e6edf3; }
      .sub { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #9fb3c8; }
      .ui { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #d8e2ec; }
      .mono { font: 600 14px 'Consolas', 'Courier New', monospace; fill: #d8e2ec; }
      .call { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #12263a; }
      .callSmall { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #17334b; }
    </style>
  </defs>

  <rect width="1400" height="780" fill="#0d1117" rx="16"/>
  <text x="36" y="48" class="title">Step 3 - Filter HTTP Requests</text>
  <text x="36" y="78" class="sub">Isolate attacker traffic and read the request pattern in order.</text>

  <rect x="34" y="100" width="980" height="640" rx="10" fill="#1f242d" stroke="#3a4451"/>
  <rect x="34" y="100" width="980" height="30" fill="#2b313c"/>
  <text x="48" y="120" class="ui">web-server_2025-07-01.pcap - Wireshark</text>

  <rect x="34" y="130" width="980" height="28" fill="#242b35"/>
  <text x="48" y="149" class="ui">Display filter</text>
  <rect x="132" y="134" width="862" height="20" rx="4" fill="#266a3f"/>
  <text x="142" y="149" class="mono">http.request and ip.src == 117.200.21.26</text>

  <rect x="50" y="168" width="948" height="554" rx="6" fill="#181d25" stroke="#4b5563"/>
  <rect x="58" y="176" width="932" height="24" fill="#243041"/>
  <text x="66" y="193" class="mono">No.    Time       Source         Destination      Host                  Request</text>

  <rect x="58" y="204" width="932" height="26" fill="#1f2937"/>
  <text x="66" y="221" class="mono">1024   09:38:14   117.200.21.26  157.230.81.229   1.vantage.tech        GET /</text>
  <rect x="58" y="232" width="932" height="26" fill="#1f2937"/>
  <text x="66" y="249" class="mono">1031   09:38:15   117.200.21.26  157.230.81.229   2.vantage.tech        GET /</text>
  <rect x="58" y="260" width="932" height="26" fill="#1f2937"/>
  <text x="66" y="277" class="mono">1052   09:38:18   117.200.21.26  157.230.81.229   abc.vantage.tech      GET /</text>
  <text x="66" y="304" class="mono">... thousands of similar subdomain GET requests ...</text>

  <rect x="58" y="318" width="932" height="28" fill="#4d3b1f"/>
  <text x="66" y="337" class="mono">1072   09:39:07   117.200.21.26  157.230.81.229   cloud.vantage.tech    GET /</text>

  <rect x="58" y="350" width="932" height="24" fill="#2d3648"/>
  <text x="66" y="367" class="mono">User-Agent changes from ffuf to Chrome</text>

  <rect x="58" y="378" width="932" height="26" fill="#243e60"/>
  <text x="66" y="395" class="mono">18201  09:39:12   117.200.21.26  157.230.81.229   cloud.vantage.tech    GET /dashboard/</text>
  <rect x="58" y="406" width="932" height="26" fill="#243e60"/>
  <text x="66" y="423" class="mono">18215  09:39:15   117.200.21.26  157.230.81.229   cloud.vantage.tech    GET /dashboard/auth/login/</text>
  <rect x="58" y="434" width="932" height="26" fill="#31557f"/>
  <text x="66" y="451" class="mono">18240  09:39:16   117.200.21.26  157.230.81.229   cloud.vantage.tech    POST /dashboard/auth/login/</text>

  <rect x="58" y="490" width="932" height="220" rx="6" fill="#111722" stroke="#334155"/>
  <text x="70" y="514" class="mono">Useful filters</text>
  <text x="70" y="538" class="mono">http.request and ip.src == 117.200.21.26 and http.user_agent contains "Fuzz"</text>
  <text x="70" y="562" class="mono">http.request and ip.src == 117.200.21.26 and http.user_agent contains "Chrome"</text>
  <text x="70" y="586" class="mono">http.request.method == POST and http.request.uri contains "/dashboard/auth/login"</text>
  <text x="70" y="610" class="mono">http.request.uri contains "horizon+openstack_dashboard"</text>

  <rect x="1030" y="148" width="340" height="240" rx="8" fill="#d3f4ff"/>
  <text x="1046" y="174" class="call">What this tells you</text>
  <text x="1046" y="198" class="callSmall">Phase 1: broad subdomain fuzzing.</text>
  <text x="1046" y="220" class="callSmall">Phase 2: focused browsing on</text>
  <text x="1046" y="242" class="callSmall">cloud.vantage.tech with login POSTs.</text>
  <text x="1046" y="264" class="callSmall">URI content reveals Horizon and</text>
  <text x="1046" y="286" class="callSmall">openstack_dashboard clues.</text>

  <line x1="1000" y1="334" x2="1030" y2="266" stroke="#58d0ff" stroke-width="3"/>
  <line x1="1000" y1="445" x2="1030" y2="298" stroke="#58d0ff" stroke-width="3"/>
</svg>