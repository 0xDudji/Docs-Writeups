<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Wireshark Step 1 Protocol Hierarchy</title>
  <desc id="desc">Wireshark-style view showing Statistics menu and Protocol Hierarchy rows to read for quick machine profiling.</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #e6edf3; }
      .sub { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #9fb3c8; }
      .ui { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #d8e2ec; }
      .mono { font: 600 14px 'Consolas', 'Courier New', monospace; fill: #d8e2ec; }
      .call { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #12263a; }
      .callSmall { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #17334b; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="780" rx="16"/>
  <text x="36" y="48" class="title">Step 1 - Protocol Hierarchy</text>
  <text x="36" y="78" class="sub">Use this first to identify machine type before reading packets.</text>

  <rect x="34" y="100" width="980" height="640" rx="10" fill="#1f242d" stroke="#3a4451"/>
  <rect x="34" y="100" width="980" height="30" fill="#2b313c"/>
  <text x="48" y="120" class="ui">web-server_2025-07-01.pcap - Wireshark</text>
  <rect x="34" y="130" width="980" height="28" fill="#242b35"/>
  <text x="48" y="149" class="ui">File  Edit  View  Go  Capture  Analyze  Statistics  Telephony  Wireless  Tools  Help</text>

  <rect x="40" y="164" width="970" height="28" fill="#1d232c"/>
  <text x="48" y="183" class="mono">Display filter: (empty)</text>

  <rect x="58" y="206" width="350" height="230" rx="6" fill="#f2f5f8" stroke="#98a4b3"/>
  <text x="74" y="228" style="font:600 14px 'Segoe UI'; fill:#1b2a3a;">Statistics</text>
  <text x="78" y="252" style="font:500 13px 'Segoe UI'; fill:#1d2d3f;">Conversations</text>
  <rect x="70" y="258" width="326" height="24" fill="#b7dcff"/>
  <text x="78" y="275" style="font:600 13px 'Segoe UI'; fill:#12324e;">Protocol Hierarchy</text>
  <text x="78" y="300" style="font:500 13px 'Segoe UI'; fill:#1d2d3f;">Endpoints</text>
  <text x="78" y="324" style="font:500 13px 'Segoe UI'; fill:#1d2d3f;">I/O Graph</text>

  <rect x="430" y="206" width="560" height="500" rx="6" fill="#181d25" stroke="#4b5563"/>
  <rect x="430" y="206" width="560" height="30" fill="#303846"/>
  <text x="442" y="226" class="ui">Protocol Hierarchy Statistics</text>

  <rect x="440" y="244" width="540" height="24" fill="#243041"/>
  <text x="448" y="261" class="mono">Protocol                     Packets       Percent Packets        Bytes</text>

  <rect x="440" y="270" width="540" height="28" fill="#1f2937"/>
  <text x="448" y="289" class="mono">Hypertext Transfer Protocol     7,482              34.6        1.5 MB</text>

  <rect x="440" y="299" width="540" height="26" fill="#223146"/>
  <text x="460" y="317" class="mono">HTML Form URL Encoded               8               0.0        1.4 KB</text>

  <rect x="440" y="328" width="540" height="26" fill="#1f2937"/>
  <text x="448" y="346" class="mono">Transmission Control Protocol  21,586              99.7        6.9 MB</text>

  <rect x="440" y="357" width="540" height="26" fill="#1f2937"/>
  <text x="448" y="375" class="mono">Address Resolution Protocol         38               0.2        1.0 KB</text>

  <line x1="1010" y1="285" x2="1130" y2="285" stroke="#58d0ff" stroke-width="3"/>
  <polygon points="1130,285 1118,278 1118,292" fill="#58d0ff"/>
  <line x1="1010" y1="312" x2="1130" y2="362" stroke="#58d0ff" stroke-width="3"/>
  <polygon points="1130,362 1118,354 1118,370" fill="#58d0ff"/>

  <rect x="1040" y="220" width="330" height="150" rx="8" fill="#d3f4ff"/>
  <text x="1056" y="246" class="call">What to read first</text>
  <text x="1056" y="270" class="callSmall">1) HTTP row shows 7,482 frames.</text>
  <text x="1056" y="292" class="callSmall">2) Nested HTML Form row shows 8.</text>
  <text x="1056" y="314" class="callSmall">3) Big gap means scan-heavy traffic,</text>
  <text x="1056" y="336" class="callSmall">   with only a few login submissions.</text>

  <rect x="1040" y="390" width="330" height="170" rx="8" fill="#d5ffe4"/>
  <text x="1056" y="416" class="call">Controller quick profile</text>
  <text x="1056" y="440" class="callSmall">Look for HTTP+JSON, MySQL, AMQP,</text>
  <text x="1056" y="462" class="callSmall">port 2379 and port 11211.</text>
  <text x="1056" y="484" class="callSmall">That combination says</text>
  <text x="1056" y="506" class="callSmall">"application controller node".</text>
  <text x="1056" y="528" class="callSmall">Exact platform is confirmed later.</text>
</svg>