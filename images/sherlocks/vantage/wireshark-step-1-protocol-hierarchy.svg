<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Wireshark Step 1 Protocol Hierarchy</title>
  <desc id="desc">Instructional visual showing where to open Protocol Hierarchy in Wireshark.</desc>
  <defs>
    <style>
      .h { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #eaf3ff; }
      .s { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #b8cbe0; }
      .m { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0a1f33; }
      .t { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #d6e7f7; }
      .c { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #0e2f4e; }
    </style>
  </defs>
  <rect width="1400" height="780" fill="#0f1722" rx="20"/>
  <text x="56" y="72" class="h">Wireshark Step 1: Protocol Hierarchy</text>
  <text x="56" y="108" class="s">Goal: identify dominant protocols in each PCAP quickly</text>

  <rect x="56" y="140" width="1288" height="560" rx="14" fill="#1a2332" stroke="#324861"/>
  <rect x="56" y="140" width="1288" height="40" fill="#223245" rx="14"/>
  <text x="78" y="166" class="t">File  Edit  View  Go  Capture  Analyze  Statistics  Telephony  Wireless  Tools  Help</text>

  <rect x="520" y="182" width="260" height="250" rx="10" fill="#f2f7ff" stroke="#6a84a3"/>
  <text x="540" y="210" class="m">Statistics</text>
  <text x="540" y="245" class="c">Conversations</text>
  <rect x="534" y="256" width="232" height="34" fill="#9fd3ff" rx="6"/>
  <text x="545" y="279" class="m">Protocol Hierarchy</text>
  <text x="540" y="320" class="c">Endpoints</text>
  <text x="540" y="355" class="c">HTTP</text>

  <line x1="430" y1="274" x2="520" y2="273" stroke="#7ee787" stroke-width="4"/>
  <polygon points="520,273 505,265 505,281" fill="#7ee787"/>
  <rect x="136" y="238" width="280" height="72" rx="10" fill="#7ee787"/>
  <text x="158" y="282" class="m">Click this menu path</text>

  <rect x="90" y="470" width="1220" height="190" rx="12" fill="#12263a" stroke="#31516e"/>
  <text x="118" y="512" class="t">Checklist</text>
  <text x="118" y="546" class="t">1. Open PCAP in Wireshark.</text>
  <text x="118" y="576" class="t">2. Go to Statistics and select Protocol Hierarchy.</text>
  <text x="118" y="606" class="t">3. Compare HTTP, MySQL, AMQP, etcd, and memcached percentages between captures.</text>
 </svg>