<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Brutus auth.log workflow</title>
  <desc id="desc">Practical auth.log triage commands for brute force and persistence analysis.</desc>
  <defs>
    <style>
      .h1 { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #edf6ff; }
      .h2 { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #b9cde1; }
      .cmd { font: 700 16px Consolas, monospace; fill: #aef0cc; }
      .tx { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #d7e7f7; }
    </style>
  </defs>
  <rect width="1400" height="780" fill="#101724" rx="20"/>
  <text x="56" y="80" class="h1">auth.log Investigation Workflow</text>
  <text x="56" y="114" class="h2">Fast command path from noisy logs to concrete attacker actions</text>

  <rect x="56" y="150" width="1288" height="580" rx="14" fill="#1a2536" stroke="#35516f"/>

  <rect x="86" y="190" width="1228" height="88" rx="10" fill="#12273b"/>
  <text x="108" y="222" class="tx">1. Count source IP frequency</text>
  <text x="108" y="252" class="cmd">grep -oP ' \d{1,3}(\.\d{1,3}){3}' auth.log | sort | uniq -c | sort -n</text>

  <rect x="86" y="292" width="1228" height="88" rx="10" fill="#102236"/>
  <text x="108" y="324" class="tx">2. Find successful auth from attacker IP</text>
  <text x="108" y="354" class="cmd">grep "Accepted" auth.log | grep "65.2.161.68"</text>

  <rect x="86" y="394" width="1228" height="88" rx="10" fill="#0f2033"/>
  <text x="108" y="426" class="tx">3. Trace session id and logout boundaries</text>
  <text x="108" y="456" class="cmd">grep "systemd-logind" auth.log ; grep "session 37" auth.log</text>

  <rect x="86" y="496" width="1228" height="88" rx="10" fill="#0e1e2f"/>
  <text x="108" y="528" class="tx">4. Detect persistence account and privilege changes</text>
  <text x="108" y="558" class="cmd">grep "useradd" auth.log ; grep "usermod" auth.log ; grep "sudo:" auth.log | grep cyberjunkie</text>

  <rect x="86" y="598" width="1228" height="88" rx="10" fill="#152a40" stroke="#40658a"/>
  <text x="108" y="632" class="tx">Output goals: attacker IP, compromised account, session id, persistence account, sudo command evidence.</text>
</svg>