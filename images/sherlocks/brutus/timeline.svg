<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Brutus timeline</title>
  <desc id="desc">UTC timeline of major attacker actions observed in Brutus artifacts.</desc>
  <defs>
    <style>
      .h1 { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #eef6ff; }
      .h2 { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #b8cce0; }
      .time { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #8be0ff; }
      .tx { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #d6e7f7; }
    </style>
  </defs>
  <rect width="1400" height="720" fill="#0f1724" rx="20"/>
  <text x="56" y="78" class="h1">Brutus Incident Timeline (UTC)</text>
  <text x="56" y="112" class="h2">From brute force burst to persistence tooling</text>

  <line x1="90" y1="340" x2="1310" y2="340" stroke="#33516d" stroke-width="6"/>

  <circle cx="180" cy="340" r="11" fill="#39d98a"/>
  <text x="136" y="300" class="time">06:31:31</text>
  <text x="118" y="382" class="tx">Brute force begins</text>

  <circle cx="350" cy="340" r="11" fill="#ffd166"/>
  <text x="306" y="300" class="time">06:31:40</text>
  <text x="278" y="382" class="tx">First root success</text>

  <circle cx="530" cy="340" r="11" fill="#ffb86b"/>
  <text x="486" y="300" class="time">06:32:44</text>
  <text x="468" y="382" class="tx">Accepted root auth</text>

  <circle cx="700" cy="340" r="11" fill="#7ee787"/>
  <text x="656" y="300" class="time">06:32:45</text>
  <text x="645" y="382" class="tx">wtmp session opens</text>

  <circle cx="875" cy="340" r="11" fill="#a78bfa"/>
  <text x="831" y="300" class="time">06:34:18</text>
  <text x="814" y="382" class="tx">Create cyberjunkie</text>

  <circle cx="1045" cy="340" r="11" fill="#f78fb3"/>
  <text x="1001" y="300" class="time">06:35:15</text>
  <text x="1016" y="382" class="tx">Add to sudo group</text>

  <circle cx="1230" cy="340" r="11" fill="#ff6b6b"/>
  <text x="1186" y="300" class="time">06:39:38</text>
  <text x="1155" y="382" class="tx">Download linper.sh</text>

  <rect x="90" y="470" width="1220" height="190" rx="14" fill="#12263a" stroke="#365b7f"/>
  <text x="120" y="520" class="tx">Correlate auth.log and wtmp to separate automated credential checks from operator-driven sessions.</text>
  <text x="120" y="558" class="tx">This distinction is key for answering login-time and session-number questions correctly.</text>
</svg>