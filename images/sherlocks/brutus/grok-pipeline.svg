<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Brutus grok pipeline</title>
  <desc id="desc">Beyond-root workflow for parsing auth.log with go-grok and querying with jq.</desc>
  <defs>
    <style>
      .h1 { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #edf6ff; }
      .h2 { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #b9cde1; }
      .bt { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #f5fbff; }
      .tx { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #d7e7f7; }
      .cmd { font: 700 15px Consolas, monospace; fill: #baf4d9; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8adfff"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="#0f1826" rx="20"/>
  <text x="56" y="86" class="h1">Beyond Root: Grok Parsing Pipeline</text>
  <text x="56" y="122" class="h2">Structured extraction from auth.log for SOC scale workflows</text>

  <rect x="90" y="210" width="260" height="170" rx="12" fill="#19344e" stroke="#376287"/>
  <text x="116" y="250" class="bt">1) Raw log</text>
  <text x="116" y="284" class="tx">auth.log</text>
  <text x="116" y="316" class="cmd">sshd, sudo, useradd...</text>

  <rect x="420" y="210" width="260" height="170" rx="12" fill="#204035" stroke="#3f7e64"/>
  <text x="446" y="250" class="bt">2) Grok patterns</text>
  <text x="446" y="284" class="tx">LOG_PREFIX + SSH_AUTH</text>
  <text x="446" y="316" class="cmd">SYSTEMD_SESSION, SUDO_CMD</text>

  <rect x="750" y="210" width="260" height="170" rx="12" fill="#3a2f48" stroke="#6a5a88"/>
  <text x="776" y="250" class="bt">3) go-grok parser</text>
  <text x="776" y="284" class="tx">ParseString per line</text>
  <text x="776" y="316" class="cmd">output JSON events</text>

  <rect x="1080" y="210" width="250" height="170" rx="12" fill="#4a3237" stroke="#8b666f"/>
  <text x="1106" y="250" class="bt">4) jq hunting</text>
  <text x="1106" y="284" class="tx">Filter source_ip, user,</text>
  <text x="1106" y="316" class="tx">session_id, command</text>

  <line x1="350" y1="296" x2="420" y2="296" stroke="#8adfff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="680" y1="296" x2="750" y2="296" stroke="#8adfff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1010" y1="296" x2="1080" y2="296" stroke="#8adfff" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="110" y="470" width="1180" height="250" rx="14" fill="#12263b" stroke="#365c80"/>
  <text x="140" y="516" class="tx">Sample command chain</text>
  <text x="140" y="552" class="cmd">go run main.go | grep "65.2.161.68" | jq '.'</text>
  <text x="140" y="586" class="cmd">go run main.go | grep "session" | grep "New" | jq '{session_id, username}'</text>
  <text x="140" y="620" class="cmd">go run main.go | grep -i "sudo" | jq '{user, tgt_user, command}'</text>
  <text x="140" y="664" class="tx">Benefit: repeatable extraction and cleaner evidence queries versus ad-hoc text parsing.</text>
</svg>