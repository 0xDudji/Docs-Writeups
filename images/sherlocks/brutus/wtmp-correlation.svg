<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Brutus wtmp correlation</title>
  <desc id="desc">How to use TZ=UTC with last and align wtmp with auth.log timestamps.</desc>
  <defs>
    <style>
      .h1 { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #edf6ff; }
      .h2 { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #b9cde1; }
      .cmd { font: 700 16px Consolas, monospace; fill: #b6f3d5; }
      .tx { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #d7e7f7; }
      .lb { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0e2538; }
    </style>
  </defs>
  <rect width="1400" height="780" fill="#0f1826" rx="20"/>
  <text x="56" y="80" class="h1">wtmp Session Analysis and Time Correlation</text>
  <text x="56" y="114" class="h2">Use UTC to avoid timeline drift and identify the real manual session</text>

  <rect x="56" y="150" width="620" height="560" rx="14" fill="#1a2638" stroke="#35506f"/>
  <text x="84" y="190" class="tx">wtmp commands</text>
  <text x="84" y="230" class="cmd">TZ=UTC last -f wtmp</text>
  <text x="84" y="262" class="cmd">TZ=UTC last -dF -f wtmp</text>
  <text x="84" y="294" class="cmd">utmpdump wtmp</text>
  <text x="84" y="326" class="cmd">TZ=UTC who -a wtmp</text>
  <text x="84" y="376" class="tx">Key check</text>
  <text x="84" y="408" class="tx">Find 65.2.161.68 sessions and compare duration:</text>
  <text x="84" y="438" class="tx">- near instant disconnect = brute force validation</text>
  <text x="84" y="468" class="tx">- multi minute session = manual operator activity</text>

  <rect x="724" y="150" width="620" height="560" rx="14" fill="#182c33" stroke="#3a6b78"/>
  <text x="752" y="190" class="tx">Correlation window</text>
  <line x1="770" y1="260" x2="1300" y2="260" stroke="#456987" stroke-width="4"/>
  <circle cx="930" cy="260" r="10" fill="#ffd166"/>
  <text x="886" y="238" class="tx">06:32:44</text>
  <text x="852" y="296" class="tx">auth.log accepted password</text>

  <circle cx="1110" cy="260" r="10" fill="#7ee787"/>
  <text x="1066" y="238" class="tx">06:32:45</text>
  <text x="1068" y="296" class="tx">wtmp session start</text>

  <rect x="760" y="360" width="548" height="70" rx="10" fill="#8be9fd"/>
  <text x="792" y="404" class="lb">1 second offset is expected between auth and session creation records.</text>

  <rect x="760" y="462" width="548" height="170" rx="10" fill="#10283d" stroke="#3f698e"/>
  <text x="788" y="500" class="tx">Result format needed by HTB question:</text>
  <text x="788" y="536" class="cmd">YYYY-MM-DD HH:MM:SS (UTC)</text>
  <text x="788" y="572" class="tx">Example: 2024-03-06 06:32:45</text>
</svg>